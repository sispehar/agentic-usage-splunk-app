# Context-window lookup: maps a model name (as reported in
# gen_ai.request.model, wildcards allowed) to its context window in tokens.
# Used by the Sessions board to estimate context fill %. First match wins —
# row order in lookups/agentic_model_context.csv matters. Unmatched models
# fall back to default_match (and the SPL coalesces to 200000 as well).
[agentic_model_context]
filename = agentic_model_context.csv
match_type = WILDCARD(model_pattern)
case_sensitive_match = false
max_matches = 1
min_matches = 1
default_match = 200000
