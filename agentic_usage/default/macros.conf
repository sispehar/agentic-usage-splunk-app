# Portability macros — override in local/macros.conf to point at your own indexes.
# The dashboards query ONLY the normalized telemetry contract produced by the
# ai-harness-otel collector (see otel/README.md): gen_ai.* / agentic.* names.
[agentic_metrics]
definition = index=agentic_metrics
iseval = 0

[agentic_data]
definition = index=agentic
iseval = 0

# Display name for a harness (a canonical harness key, normally a well-known
# service.name value). Edit together with harness_key(2) and the Harness
# dropdown items when a new harness is onboarded in the collector.
# NOTE: macro arguments must not contain commas — eval a temp var
# first (e.g. | eval s0=mvindex(svc,0)) and pass that.
[harness_label(1)]
args = svc
definition = case($svc$=="claude-code","Claude Code", $svc$=="claude-code-desktop","Claude Desktop", $svc$=="cowork","Cowork", $svc$=="gemini-cli","Gemini CLI", $svc$=="codex","Codex", isnull($svc$),"Unknown", true(), $svc$)
iseval = 0

# Canonical harness key used for filtering and grouping. Prefers a well-known
# service.name (needed to tell Claude Code / Claude Desktop / Cowork apart —
# they share the claude_code harness lane), then falls back to the collector's
# stable discriminator agentic.harness.name so telemetry with a custom
# OTEL_SERVICE_NAME still lands in the right bucket (see NORMALIZATION.md
# "Resource identity and provenance"), and finally keeps the raw service.name
# for unrecognized producers. Args: svc = service.name, hn =
# agentic.harness.name ("__missing__" is the mstats fillnull sentinel).
[harness_key(2)]
args = svc, hn
definition = case($svc$ IN ("claude-code","claude-code-desktop","cowork","gemini-cli","codex"), $svc$, $hn$=="claude_code", "claude-code", $hn$=="gemini_cli", "gemini-cli", $hn$=="codex", "codex", isnotnull($svc$) AND $svc$!="__missing__", $svc$, true(), null())
iseval = 0
