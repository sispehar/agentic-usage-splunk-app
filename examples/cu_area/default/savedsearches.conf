[Agentic Usage - Area Chart Demo]
search = | makeresults count=168 | streamstats count as i | eval _time=now()-(168-i)*3600 | eval hour=(i%24) | eval work=if(hour>=8 AND hour<=20,1,0.12) | eval base=work*(18+(random()%22)) | eval spike=if((i%24)>=10 AND (i%24)<=13, (random()%120), 0) | eval cacheRead=round(base*0.55+spike*0.6+(random()%8),1), cacheCreation=round(base*0.18+spike*0.2+(random()%5),1), input=round(base*0.05+1,1), output=round(base*0.04+1,1) | eval hourLabel=strftime(_time,"%a, %b %d · %H:%M"), tickLabel=strftime(_time,"%a %d") | table _time cacheRead cacheCreation input output hourLabel tickLabel
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cu_area.cu_area
display.visualizations.custom.cu_area.cu_area.title = Token Usage by Hour
display.visualizations.custom.cu_area.cu_area.valueDivisor = 1
display.visualizations.custom.cu_area.cu_area.valueUnit = M
display.visualizations.custom.cu_area.cu_area.showLegend = true
display.visualizations.custom.cu_area.cu_area.theme = dark
