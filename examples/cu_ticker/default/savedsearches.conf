[Agentic Usage - Live Ticker Demo]
search = | makeresults count=8 | streamstats count AS n | eval _time=now()-(n*120), kind=mvindex(split("PROMPT,START,COMPACT,PROMPT,ERROR,PROMPT,START,PROMPT",","),n-1), user=mvindex(split("simon.spehar,tilen.mlakar,jakob.gazic,ratko.perlic,denis.urek,zan.gregorc,robert.silar,marko.berend",","),n-1) | eval text=user.case(kind=="PROMPT"," sent a prompt",kind=="START"," started a session",kind=="COMPACT"," compacted context",1=1," hit an API error") | table _time kind user text | appendpipe [| stats count | where count=0 | eval _status="Awaiting data"]
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cu_ticker.cu_ticker
display.visualizations.custom.cu_ticker.cu_ticker.title = SESSIONS
display.visualizations.custom.cu_ticker.cu_ticker.kindField = kind
display.visualizations.custom.cu_ticker.cu_ticker.textField = text
display.visualizations.custom.cu_ticker.cu_ticker.scrollSpeed = medium
display.visualizations.custom.cu_ticker.cu_ticker.maxItems = 30
display.visualizations.custom.cu_ticker.cu_ticker.accentColor = #28b6a4
display.visualizations.custom.cu_ticker.cu_ticker.liveColor = #f2643d
display.visualizations.custom.cu_ticker.cu_ticker.theme = dark
