[Agentic Usage - Heatmap Demo]
search = | makeresults count=168 | streamstats count as i | eval day=floor((i-1)/24), h=((i-1)%24) | eval dnames=split("Wed,Thu,Fri,Sat,Sun,Mon,Tue",",") | eval d=mvindex(dnames, day) | eval work=if(h>=8 AND h<=20,1,0.12) | eval v=round(work*(20+(random()%40))+if(h>=10 AND h<=13,(random()%120),0)) | table d h v
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cu_heatmap.cu_heatmap
display.visualizations.custom.cu_heatmap.cu_heatmap.title = Activity Heatmap
display.visualizations.custom.cu_heatmap.cu_heatmap.subtitle = tokens by day & hour
display.visualizations.custom.cu_heatmap.cu_heatmap.dayField = d
display.visualizations.custom.cu_heatmap.cu_heatmap.hourField = h
display.visualizations.custom.cu_heatmap.cu_heatmap.valueField = v
display.visualizations.custom.cu_heatmap.cu_heatmap.lowColor = #28b6a4
display.visualizations.custom.cu_heatmap.cu_heatmap.highColor = #f2643d
display.visualizations.custom.cu_heatmap.cu_heatmap.valueDivisor = 1
display.visualizations.custom.cu_heatmap.cu_heatmap.valueUnit = M
display.visualizations.custom.cu_heatmap.cu_heatmap.theme = dark
